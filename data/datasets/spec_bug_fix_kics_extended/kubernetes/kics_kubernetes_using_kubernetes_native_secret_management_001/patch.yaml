apiVersion: v1
kind: SecretProviderClass
metadata:
  name: cluster-secrets-provider
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    keyvaultName: "my-keyvault"
    objects: |
      array:
        - |
          objectName: certificate-authority-data
          objectType: secret
        - |
          objectName: bearerToken
          objectType: secret
    tenantId: "${TENANT_ID}"
---
apiVersion: v1
kind: Secret
metadata:
  name: cluster-secrets
type: Opaque
