---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: myapp
    name: myapp
  name: myapp-deploy
spec:
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
        name: myapp
    spec:
      containers:
        -
          args:
            - "--listen=10.7.2.8:44134"
          image: myapp-image
          name: myapp-v2
          ports:
            -
              containerPort: 44134
              name: myapp
              protocol: TCP
            -
              containerPort: 44135
              name: http
              protocol: TCP
      serviceAccountName: myapp
