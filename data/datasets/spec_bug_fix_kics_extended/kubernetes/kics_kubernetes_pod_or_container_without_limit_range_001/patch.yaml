apiVersion: v1
kind: LimitRange
metadata:
  name: limitrange-myPod
  namespace: myPod
spec:
  limits:
  - max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "100m"
      memory: "32Mi"
    type: Container
---
apiVersion: v1
kind: Pod
metadata:
  name: frontend1
  namespace: myPod
spec:
  containers:
  - name: app
    image: images.my-company.example/app:v4
    securityContext:
      allowPrivilegeEscalation: false
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
      limits:
        memory: "128Mi"
        cpu: "500m"
