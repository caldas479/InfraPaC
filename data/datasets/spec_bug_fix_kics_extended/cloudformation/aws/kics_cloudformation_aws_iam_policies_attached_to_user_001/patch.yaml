AWSTemplateFormatVersion: "2010-09-09"
Description: A sample template
Parameters:
  UserPassword:
    Type: String
    NoEcho: true
    Description: Password for the IAM user
Resources:
    myuser:
      Type: AWS::IAM::User
      Properties:
        Path: "/"
        LoginProfile:
          Password: !Ref UserPassword
    myusergroup:
      Type: AWS::IAM::Group
      Properties:
        Path: "/"
        ManagedPolicyArns:
          - "arn:aws:iam::123456789012:policy/UsersManageOwnCredentials"
          - "arn:aws:iam::123456789012:policy/division_abc/subdivision_xyz/UsersManageOwnCredentials"
        Policies:
          - PolicyName: giveaccesstoqueueonly
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - sqs:*
                  Resource:
                    - !GetAtt myqueue.Arn
                - Effect: Deny
                  Action:
                    - sqs:*
                  NotResource:
                    - !GetAtt myqueue.Arn
    myusergroupmembership:
      Type: AWS::IAM::UserToGroupAddition
      Properties:
        GroupName: !Ref myusergroup
        Users:
          - !Ref myuser
    myqueue:
      Type: AWS::SQS::Queue
