AWSTemplateFormatVersion: "2010-09-09"
Description: "Router53"
Resources:
  HostedZone3:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: "HostedZone"
      QueryLoggingConfig:
        CloudWatchLogsLogGroupArn: !GetAtt QueryLoggingLogGroup.Arn
  QueryLoggingLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: "/aws/route53/HostedZone"
      RetentionInDays: 7
