Parameters:
  ParentMasterPassword:
    Description: 'Password'
    Type: String
    NoEcho: true
  ParentMasterUsername:
    Description: 'username'
    Type: String
    Default: 'username!'
  SimpleADPassword:
    Description: 'Simple AD Password'
    Type: String
    NoEcho: true
Resources:
  NewAmpApp4:
    Type: AWS::DirectoryService::SimpleAD
    Properties:
        CreateAlias: true
        Description: String
        EnableSso: true
        Name: String
        Password: !Ref SimpleADPassword
        ShortName: String
        Size: String
