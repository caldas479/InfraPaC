AWSTemplateFormatVersion: 2010-09-09
Parameters:
  AmpAppAccessToken:
    Type: String
    NoEcho: true
    Description: Access token for Amplify App
Resources:
  AmpAppAccessTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Access token for Amplify App
      SecretString: !Ref AmpAppAccessToken
  NewAmpApp:
    Type: AWS::Amplify::App
    Properties:
      AccessToken: !Sub '{{resolve:secretsmanager:${AmpAppAccessTokenSecret}}}'
      BuildSpec: String
      CustomHeaders: String
      Description: String
      EnableBranchAutoDeletion: True
      IAMServiceRole: String
      Name: String
      Repository: String
