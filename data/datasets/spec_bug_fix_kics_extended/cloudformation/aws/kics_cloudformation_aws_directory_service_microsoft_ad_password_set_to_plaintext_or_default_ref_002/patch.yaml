Resources:
  NewAmpApp:
      Type: AWS::DirectoryService::MicrosoftAD
      Properties:
          CreateAlias: true
          Edition: String
          EnableSso: true
          Name: String
          Password: !Sub '{{resolve:secretsmanager:${MicrosoftADPasswordSecret}:SecretString:password}}'
          ShortName: String
  MicrosoftADPasswordSecret:
      Type: AWS::SecretsManager::Secret
      Properties:
          Description: Password for Microsoft AD
          GenerateSecretString:
              SecretStringTemplate: '{}'
              GenerateStringKey: password
              PasswordLength: 32
              ExcludeCharacters: '"@/\'
              RequireEachIncludedType: true
