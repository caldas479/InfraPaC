AWSTemplateFormatVersion: 2010-09-09
Parameters:
  ParentPassword:
    Description: 'Password'
    Type: String
    NoEcho: true
  ParentUsername:
    Description: 'Username'
    Type: String
    NoEcho: true
Resources:
  AmplifyAppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: 'Secret for Amplify App Basic Auth'
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '"@/\'
  NewAmpApp-4:
    Type: AWS::Amplify::App
    Properties:
      BuildSpec: String
      CustomHeaders: String
      Description: String
      EnableBranchAutoDeletion: true
      IAMServiceRole: String
      Name: NewAmpApp
      Repository: String
      BasicAuthConfig:
        EnableBasicAuth: true
        Password: !Sub '{{resolve:secretsmanager:${AmplifyAppSecret}:SecretString:password}}'
        Username: !Ref ParentUsername
