AWSTemplateFormatVersion: "2010-09-09"
Description: A sample template
Resources:
    myuser:
      Type: AWS::IAM::User
      Properties:
        Path: "/"
        LoginProfile:
          Password: !Ref UserPassword
    mygroup:
      Type: AWS::IAM::Group
      Properties:
        Path: "/"
    mypolicy:
      Type: AWS::IAM::Policy
      Properties:
        PolicyName: giveaccesstoqueueonly
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - sqs:*
            Resource:
            - !GetAtt myqueue.Arn
          - Effect: Deny
            Action:
            - sqs:*
            NotResource:
            - !GetAtt myqueue.Arn
        Groups:
          - !Ref mygroup
    myusertogroup:
      Type: AWS::IAM::UserToGroupAddition
      Properties:
        GroupName: !Ref mygroup
        Users:
          - !Ref myuser
          - existinguser1
          - existinguser2
    myqueue:
      Type: AWS::SQS::Queue
Parameters:
  UserPassword:
    Type: String
    NoEcho: true
    Description: Password for IAM user
