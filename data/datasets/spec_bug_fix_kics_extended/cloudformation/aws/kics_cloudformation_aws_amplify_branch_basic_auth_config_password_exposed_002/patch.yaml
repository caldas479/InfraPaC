Parameters:
  ParentPassword:
    Description: 'Password'
    Type: String
    NoEcho: true
  ParentUsername:
    Description: 'Username'
    Type: String
    Default: ""
Resources:
  AmplifyBranchPassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: 'Amplify Branch Basic Auth Password'
      SecretString: !Ref ParentPassword
  NewAmpApp4:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: String
      BranchName: String
      BuildSpec: String
      Description: String
      EnableAutoBuild: false
      EnablePerformanceMode: false
      EnablePullRequestPreview: false
      EnvironmentVariables:
        - EnvironmentVariable
      PullRequestEnvironmentName: String
      Stage: String
      BasicAuthConfig:
        EnableBasicAuth: true
        Password: !Sub '{{resolve:secretsmanager:${AmplifyBranchPassword}}}'
        Username: !Ref ParentUsername
