AWSTemplateFormatVersion: "2010-09-09"
Description: A sample template
Resources:
    TestUserGroup:
      Type: AWS::IAM::Group
      Properties:
        GroupName: TestUserGroup
    emptyGroup:
      Type: AWS::IAM::User
      Properties:
        Groups:
          - !Ref TestUserGroup
        Path: "/"
        Policies:
        - PolicyName: giveaccesstoqueueonly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
            - Effect: Allow
              Action:
              - sqs:*
              Resource:
              - !GetAtt myqueue.Arn
            - Effect: Deny
              Action:
              - sqs:*
              NotResource:
              - !GetAtt myqueue.Arn
        Tags:
          - QAUser
        UserName: TestUser
