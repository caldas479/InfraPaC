AWSTemplateFormatVersion: "2010-09-09"
Description: "Volume 02"
Resources:
  NewVolume02:
    Type: AWS::EC2::Volume
    Properties:
      Size: 100
      AvailabilityZone: !GetAtt Ec2Instance.AvailabilityZone
      Encrypted: true
      Tags:
        - Key: MyTag
          Value: TagValue
    DeletionPolicy: Snapshot
