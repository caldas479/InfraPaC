AWSTemplateFormatVersion: 2010-09-09
Parameters:
  BasicAuthPassword:
    Type: String
    NoEcho: true
    Description: Password for Amplify App Basic Authentication
Resources:
  BasicAuthPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Secret for Amplify App Basic Authentication Password
      SecretString: !Ref BasicAuthPassword
  NewAmpApp1:
    Type: AWS::Amplify::App
    Properties:
      BuildSpec: String
      CustomHeaders: String
      Description: String
      EnableBranchAutoDeletion: true
      IAMServiceRole: String
      Name: NewAmpApp
      Repository: String
      BasicAuthConfig:
        EnableBasicAuth: true
        Password: !Sub '{{resolve:secretsmanager:${BasicAuthPasswordSecret}}}'
        Username: admin
