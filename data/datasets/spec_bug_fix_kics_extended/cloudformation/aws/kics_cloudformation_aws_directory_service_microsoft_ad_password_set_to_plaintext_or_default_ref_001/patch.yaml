Parameters:
  ParentMasterUsername:
    Description: 'username'
    Type: String
    Default: 'username!'
  MicrosoftADPassword:
    Description: 'Password for Microsoft AD'
    Type: String
    NoEcho: true
Resources:
  NewAmpApp-2:
      Type: AWS::DirectoryService::MicrosoftAD
      Properties:
          CreateAlias: true
          Edition: String
          EnableSso: true
          Name: String
          Password: !Ref MicrosoftADPassword
          ShortName: String
