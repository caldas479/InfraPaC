AWSTemplateFormatVersion: 2010-09-09
Parameters:
  ParentAccessToken:
    Description: 'Access Token'
    Type: String
    NoEcho: true
Resources:
  AmpAppAccessTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: 'Access Token for Amplify App'
      SecretString: !Ref ParentAccessToken
  AmpApp:
    Type: AWS::Amplify::App
    Properties:
      AccessToken: !Sub '{{resolve:secretsmanager:${AmpAppAccessTokenSecret}}}'
      BuildSpec: String
      CustomHeaders: String
      Description: String
      EnableBranchAutoDeletion: true
      IAMServiceRole: String
      Name: NewAmpApp
      Repository: String
