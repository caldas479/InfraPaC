AWSTemplateFormatVersion: "2010-09-09"
Description: A sample template
Resources:
  mypolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: mygrouppolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action: ["s3:GetObject"]
          Resource: "arn:aws:s3:::example-bucket/*"
      Groups:
      - myexistinggroup1
      - !Ref mygroup
  mypolicy2:
