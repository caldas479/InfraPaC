Parameters:
  SimpleADPassword:
    Type: String
    NoEcho: true
    Description: Password for Simple AD
Resources:
  NewAmpApp5:
    Type: AWS::DirectoryService::SimpleAD
    Properties:
      CreateAlias: true
      Description: String
      EnableSso: true
      Name: String
      Password: !Ref SimpleADPassword
      ShortName: String
      Size: String
