Parameters:
  OAuthTokenParameter:
    Type: String
    NoEcho: true
    Description: OAuth token for Amplify App

Resources:
  NewAmpApp:
    Type: AWS::Amplify::App
    Properties:
      BuildSpec: String
      CustomHeaders: String
      Description: String
      EnableBranchAutoDeletion: true
      IAMServiceRole: String
      Name: NewAmpApp
      Repository: String
      OauthToken: !Ref OAuthTokenParameter
