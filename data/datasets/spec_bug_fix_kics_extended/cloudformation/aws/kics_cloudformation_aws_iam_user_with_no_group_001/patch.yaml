AWSTemplateFormatVersion: "2010-09-09"
Description: A sample template
Parameters:
  UserPassword:
    Type: String
    NoEcho: true
    Description: Password for the IAM user
Resources:
    MyUserGroup:
      Type: AWS::IAM::Group
      Properties:
        GroupName: TestUserGroup
        Policies:
        - PolicyName: giveaccesstoqueueonly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
            - Effect: Allow
              Action:
              - sqs:*
              Resource:
              - !GetAtt myqueue.Arn
            - Effect: Deny
              Action:
              - sqs:*
              NotResource:
              - !GetAtt myqueue.Arn
    MyUser:
      Type: AWS::IAM::User
      Properties:
        Path: "/"
        LoginProfile:
          Password: !Ref UserPassword
        Groups:
          - !Ref MyUserGroup
        Tags:
          - Key: Role
            Value: QAUser
        UserName: TestUser
    myqueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: MyQueue
