Resources:
  MySkillRefreshTokenSecret:
    Type: "AWS::SecretsManager::Secret"
    Properties:
      Description: "Alexa Skill Refresh Token"
      SecretString: "Atzr|1234"
  MySkillClientSecret:
    Type: "AWS::SecretsManager::Secret"
    Properties:
      Description: "Alexa Skill Client Secret"
      SecretString: "1234"
  MySkill:
    Type: "Alexa::ASK::Skill"
    Properties:
      SkillPackage:
        S3Bucket: "my-skill-packages"
        S3Key: "skillpackage.zip"
        S3BucketRole: !GetAtt S3BucketReadRole.Arn
        Overrides:
          Manifest:
            apis:
              custom:
                endpoint:
                  uri: !GetAtt SkillFunction.Arn
      AuthenticationConfiguration:
        ClientId: "amzn1.application-oa2-client.1234"
        ClientSecret: !Sub "{{resolve:secretsmanager:${MySkillClientSecret}}}"
        RefreshToken: !Sub "{{resolve:secretsmanager:${MySkillRefreshTokenSecret}}}"
      VendorId: "1234"
